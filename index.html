<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Enji.ai — Staff Workload</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;padding:24px;font-size:13px;display:flex;flex-direction:column;gap:0}
#app{flex:1;display:flex;flex-direction:column}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
h1{font-size:16px;font-weight:500;color:#1a1a1a}
h1 span{font-size:12px;color:#aaa;font-weight:400;margin-left:8px}
.admin-label{display:flex;align-items:center;gap:7px;font-size:12px;color:#777;cursor:pointer;user-select:none}
.admin-label input{cursor:pointer;accent-color:#444;width:14px;height:14px}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.toolbar input{flex:1;min-width:180px;height:34px;padding:0 11px;border:1px solid #e2e2e2;border-radius:6px;font-size:12px;background:#fff;color:#1a1a1a;outline:none;transition:border-color .12s}
.toolbar input:focus{border-color:#aaa}
.toolbar select{height:34px;padding:0 8px;border:1px solid #e2e2e2;border-radius:6px;font-size:12px;background:#fff;color:#1a1a1a;min-width:130px;outline:none;cursor:pointer}
#rbtn{height:34px;padding:0 12px;font-size:12px;color:#888;cursor:pointer;border:1px solid #ddd;border-radius:6px;background:#fff;display:none;white-space:nowrap}
#rbtn:hover{background:#f4f4f2}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.sc{background:#fff;border-radius:9px;padding:16px 18px;cursor:pointer;border:1.5px solid #eee;user-select:none;transition:border-color .12s}
.sc:hover:not(.nc){border-color:#ccc}
.sc.act{border-color:#333;border-width:2px}
.sc.nc{cursor:default}
.sc .lb{font-size:11px;color:#aaa;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.sc .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sc .vl{font-family:'SF Mono','Fira Mono','Consolas',monospace;font-size:26px;font-weight:500;line-height:1.15}
.sc .sub{font-size:11px;color:#ccc;margin-top:4px}

.metarow{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:#aaa;align-items:center}
.legend .li{display:flex;align-items:center;gap:4px}
.legend .lsw{width:10px;height:7px;border-radius:2px;flex-shrink:0}
.legend .sep{color:#e0e0e0;margin:0 2px}
.rescount{font-size:12px;color:#bbb;white-space:nowrap;flex-shrink:0}

.tbl-wrap{flex:1;border:1px solid #e8e8e6;border-radius:10px;overflow:hidden;background:#fff;display:flex;flex-direction:column;min-height:240px}
.tbl-inner{flex:1;overflow:auto}
table{width:100%;min-width:940px;border-collapse:collapse}
thead th{position:sticky;top:0;z-index:2;background:#fff;border-bottom:1px solid #eeeeec;padding:11px 13px;text-align:left;font-weight:500;font-size:11px;color:#bbb;white-space:nowrap}
thead th.ra{text-align:right}
tbody tr{border-bottom:1px solid #f3f3f1;transition:background .06s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:#fafafb}
td{padding:12px 13px;vertical-align:middle}

.ncel{display:flex;align-items:center;gap:8px;min-width:0}
.ava{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;letter-spacing:.3px}
.dota{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nmt{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:106px}
.pbd{font-size:10px;padding:2px 5px;border-radius:3px;background:#f2f2f0;color:#aaa;flex-shrink:0}
.abadge{font-size:10px;padding:2px 5px;border-radius:3px;background:#eef0fb;color:#5a64c2;flex-shrink:0}

.cbar{height:8px;border-radius:4px;overflow:hidden;background:#e9e9e7;display:flex;margin-bottom:6px}
.sgp{background:#5a9919;height:100%}
.sgb{background:#c98a0d;height:100%}
.sgo{background:#d44040;height:100%}
.ctxt{font-size:11px;display:flex;gap:6px;color:#ccc;flex-wrap:wrap}
.cpd{color:#3B6D11}
.cov2{color:#A32D2D}

.allc{font-family:'SF Mono','Fira Mono','Consolas',monospace;font-size:13px;text-align:right;color:#555}

.bcc{font-family:'SF Mono','Fira Mono','Consolas',monospace;font-size:13px;text-align:right;white-space:nowrap;color:#1a1a1a}
.apx{font-size:10px;color:#ccc}
.nd2{color:#ccc}

.chps{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.chp{display:inline-flex;align-items:baseline;gap:5px;font-size:11px;padding:3px 8px;border-radius:5px;background:#f4f4f2;border:1px solid #e9e9e7;cursor:default;white-space:nowrap}
.chp .cn{font-weight:500;color:#1a1a1a}
.chp .cs{font-family:'SF Mono','Fira Mono','Consolas',monospace;font-size:10px;color:#bbb}
.cmore{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid #e0e0de;color:#aaa;cursor:pointer;background:#fff;white-space:nowrap}
.cmore:hover{background:#f6f6f4;border-color:#ccc;color:#888}

.rcel{display:flex;flex-direction:column;gap:2px}
.rpo{font-size:12px;white-space:nowrap;color:#1a1a1a}
.rse{font-size:11px;color:#ccc}

.sktg{display:flex;flex-wrap:wrap;gap:3px}
.stg{font-size:10px;padding:2px 7px;border-radius:4px;background:#f2f2f0;color:#999;white-space:nowrap}

.est{text-align:center;padding:56px;color:#ccc;font-size:14px}

#tt{position:fixed;background:#1c1c1c;color:#fff;border-radius:7px;padding:11px 14px;font-size:11px;pointer-events:none;z-index:9999;display:none;min-width:190px;max-width:270px;line-height:1.75;box-shadow:0 6px 20px rgba(0,0,0,.22)}
#tt .ttitle{font-weight:600;font-size:12px;margin-bottom:6px;color:#fff;border-bottom:1px solid #333;padding-bottom:5px}
#tt .trow{display:flex;justify-content:space-between;gap:18px;color:#888}
#tt .trow span:last-child{font-family:'SF Mono','Fira Mono','Consolas',monospace;color:#ddd}
#tt .tdiv{border-top:1px solid #2e2e2e;margin:7px 0 5px}
#tt .tmore{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
#tt .tbold{font-weight:600;color:#eee;font-size:11px;margin-bottom:2px}
</style>
</head>
<body>
<div id="app">

<div class="topbar">
  <h1>Staff workload <span>Enji.ai prototype · April 2026</span></h1>
  <label class="admin-label">
    <input type="checkbox" id="showAdmin" onchange="ej.flt()">
    Show admin staff
  </label>
</div>

<div class="toolbar">
  <input type="text" id="srch" placeholder="Search by name..." oninput="ej.srch(this.value)">
  <select id="fps" onchange="ej.flt()"><option value="">All positions</option></select>
  <select id="fse" onchange="ej.flt()"><option value="">All seniority</option><option>Junior</option><option>Middle</option><option>Senior</option><option>Lead</option></select>
  <select id="fsk" onchange="ej.flt()"><option value="">All stacks</option></select>
  <button id="rbtn" onclick="ej.rst()">Clear filters ×</button>
</div>

<div class="summary" id="sm"></div>

<div class="metarow">
<div class="legend">
  <strong style="font-size:11px;font-weight:500;color:#777">Capacity bar:</strong>
  <span class="li"><span class="lsw" style="background:#5a9919"></span>Paid (client)</span>
  <span class="li"><span class="lsw" style="background:#c98a0d"></span>Bench / internal</span>
  <span class="li"><span class="lsw" style="background:#e2e2e0;border:1px solid #d6d6d4"></span>Free</span>
  <span class="li"><span class="lsw" style="background:#d44040"></span>Overload</span>
  <span class="sep">|</span>
  <strong style="font-size:11px;font-weight:500;color:#777">Status dot:</strong>
  <span class="li"><span style="width:7px;height:7px;border-radius:50%;background:#E24B4A;display:inline-block"></span>Overloaded</span>
  <span class="li"><span style="width:7px;height:7px;border-radius:50%;background:#EF9F27;display:inline-block"></span>Free &lt;30d</span>
  <span class="li"><span style="width:7px;height:7px;border-radius:50%;background:#639922;display:inline-block"></span>Free now</span>
  <span class="li"><span style="width:7px;height:7px;border-radius:50%;background:#378ADD;display:inline-block"></span>Underloaded</span>
  <span class="li"><span style="width:7px;height:7px;border-radius:50%;background:#888;display:inline-block"></span>Busy</span>
</div>
<div class="rescount" id="rc"></div>
</div>

<div class="tbl-wrap"><div class="tbl-inner">
  <table>
    <thead><tr>
      <th style="width:192px">Employee</th>
      <th style="width:196px">Capacity</th>
      <th style="width:78px" class="ra">Allocated</th>
      <th style="width:96px" class="ra">Bench cost</th>
      <th>Current SoW</th>
      <th style="width:134px">Role</th>
      <th style="width:116px">Stack</th>
    </tr></thead>
    <tbody id="tbd"></tbody>
  </table>
</div></div>

</div>
<div id="tt"></div>

<script>
window.ej=(function(){
const T=new Date('2026-04-08'),I30=new Date('2026-05-08');
function mkR(s){let x=s>>>0;return()=>{x=(Math.imul(1664525,x)+1013904223)>>>0;return x/4294967295;};}
const rng=mkR(8421);
const rc=a=>a[Math.floor(rng()*a.length)];
const ri=(a,b)=>Math.floor(rng()*(b-a+1))+a;
const rb=p=>rng()<p;

const FN=['Alexander','Timofey','Bashir','Oleg','Ivan','Maria','Dmitry','Anastasia','Sergey','Ekaterina','Mikhail','Natalia','Andrey','Tatiana','Alexey','Elena','Nikita','Daria','Maxim','Svetlana','Anton','Yulia','Artem','Anna','Denis','Ksenia','Evgeny','Polina','Roman','Alina','Amir','Fatima','Ruslan','Aigerim','Marat','Gulnara','Timur','Zarina','Bakit','Nazgul','Azamat','Asel','Bekzod','Malika','Jasur','Nilufar','Sam','Emma','Noah','Olivia','Liam','Sophia','James','Isabella','Oliver','Mia','Lucas','Charlotte','Ben','Grace','Tom','Claire','Chris','Diana','Paul','Rita','Viktor','Yana','Boris','Vera','Gleb','Kostya','Pasha','Fedya','Kolya','Alex','Nora'];
const LN=['Ivanov','Petrov','Sidorov','Kozlov','Novikov','Morozov','Volkov','Alekseev','Lebedev','Semenov','Egorov','Pavlov','Puzanov','Klimenko','Sapozhnikov','Fedorenko','Kasymov','Alferov','Kononov','Kosyakov','Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Martinez','Wilson','Anderson','Taylor','Taiirova','Alymkulov','Zaichenko','Grishchenko','Abdukova','Sokolov','Popov','Vasiliev','Nikitin','Fedorov','Bediev','Jukeshov','Orlov','Makarov','Filippov'];
const POS=[
  {n:'Backend Dev',st:[['Go','PostgreSQL'],['Python','Django'],['Node.js','MongoDB'],['Java','Spring'],['Python','FastAPI']]},
  {n:'Frontend Dev',st:[['React','TypeScript'],['Vue','JavaScript'],['Angular','RxJS'],['React','Next.js']]},
  {n:'Full-Stack Dev',st:[['React','Node.js'],['Vue','Python'],['Next.js','Go'],['React','Django']]},
  {n:'DevOps',st:[['AWS','Kubernetes'],['GCP','Docker'],['Azure','Terraform'],['Kubernetes','Helm']]},
  {n:'QA Engineer',st:[['Selenium','Python'],['Cypress','JavaScript'],['Playwright','TypeScript']]},
  {n:'Mobile Dev',st:[['iOS','Swift'],['Android','Kotlin'],['React Native','TS'],['Flutter','Dart']]},
  {n:'Data Engineer',st:[['Python','Spark'],['Airflow','PostgreSQL'],['dbt','Snowflake']]},
  {n:'Designer',st:[['Figma','Protopie'],['Figma','Adobe XD']]},
  {n:'Tech Lead',st:[['Go','React'],['Python','PostgreSQL'],['Node.js','AWS'],['Java','K8s']]},
];
const APOS=[
  {n:'HR Manager',st:[['Notion','HRIS']]},
  {n:'Finance Analyst',st:[['Excel','1C']]},
  {n:'Operations Manager',st:[['Jira','Confluence']]},
  {n:'Legal Counsel',st:[['Notion','']]},
  {n:'Marketing Manager',st:[['HubSpot','Figma']]},
  {n:'Recruiter',st:[['LinkedIn','Notion']]},
  {n:'Accountant',st:[['1C','Excel']]},
  {n:'Office Manager',st:[['Notion','']]},
];
const PRJ=['Amazon','Apple','GoDee','Veeqo','Lido','Clutch','Fintech LLC','uPaint','Guardrails','MythX','Roci.fi','TriggerMesh'];
const INT=['Internal','R&D','bug.fix','Onboarding','Infra'];
const SCOL={overloaded:'#E24B4A',free30:'#EF9F27',free:'#639922',underloaded:'#378ADD',busy:'#aaa'};
const SPRI={overloaded:1,free30:2,free:3,underloaded:4,busy:5};
const AVP=[['#B5D4F4','#0C447C'],['#C0DD97','#27500A'],['#FAC775','#633806'],['#CECBF6','#3C3489'],['#F5C4B3','#712B13'],['#9FE1CB','#085041']];

function gd(mn,mx){const d=new Date(T);d.setDate(d.getDate()+ri(mn,mx));return d.toISOString().slice(0,10);}
function mSow(ic,eH,d0,d1){
  const p=ic?rc(PRJ):rc(INT);
  const pH=ic?(rb(.88)?eH:Math.round(eH*(.73+rng()*.27))):0;
  return{project:p,expH:eH,paidH:pH,endsAt:gd(d0,d1)};
}
function getSt(e){
  if(e.exp===0)return'free';
  if(e.exp>160)return'overloaded';
  if(e.sow.some(s=>{const d=new Date(s.endsAt);return d>=T&&d<=I30;}))return'free30';
  if(e.exp===160)return'busy';
  return'underloaded';
}
const usedN=new Set();
function mkBase(id,isAdm){
  let nm,att=0;
  do{nm=rc(FN)+' '+rc(LN);att++;}while(att<10&&usedN.has(nm));
  usedN.add(nm);
  return{id,name:nm,init:nm.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(),isAdmin:isAdm};
}
function genE(id){
  const b=mkBase(id,false);
  const pos=rc(POS),stk=[...rc(pos.st)].filter(Boolean);
  const sen=rc(['Junior','Middle','Middle','Senior','Senior','Lead']);
  const pt=rc(['Fixed','Fixed','Fixed','Hourly',null]);
  const r=rng();
  const cat=r<.10?'overloaded':r<.17?'free':r<.27?'free30':r<.55?'underloaded':'busy';
  const sow=[];
  if(cat==='overloaded'){
    sow.push(mSow(true,ri(80,120),45,160));
    sow.push(mSow(rb(.6),ri(60,100),30,160));
    if(rb(.4))sow.push(mSow(false,ri(20,40),20,90));
  }else if(cat==='free30'){
    sow.push(mSow(true,ri(80,160),3,25));
    if(rb(.45))sow.push(mSow(false,ri(15,40),45,150));
  }else if(cat==='busy'){
    if(rb(.4)){const h1=ri(60,100);sow.push(mSow(true,h1,45,180));sow.push(mSow(rb(.5),160-h1,40,180));}
    else sow.push(mSow(true,160,45,200));
  }else if(cat==='underloaded'){
    const h1=ri(40,110);
    sow.push(mSow(rb(.65),h1,45,180));
    if(rb(.38)&&h1<=100)sow.push(mSow(false,ri(15,Math.min(40,140-h1)),30,120));
  }
  const paid=sow.reduce((s,w)=>s+w.paidH,0);
  const exp=sow.reduce((s,w)=>s+w.expH,0);
  const bench=Math.max(0,160-paid);
  const free=Math.max(0,160-exp);
  const ncMap={Junior:[1200,2000],Middle:[2000,3500],Senior:[3500,5500],Lead:[5000,8000]};
  const nc=rb(.83)?ri(...ncMap[sen]):null;
  const base=nc??ri(1500,4000);
  const bc=bench>0?Math.round((base/ri(120,165))*bench):0;
  return{...b,pos:pos.n,stk,sen,pt,sow,paid,exp,bench,free,nc,bc,bca:nc==null,status:''};
}
function genAdmin(id){
  const b=mkBase(id,true);
  const pos=rc(APOS);
  const stk=[...rc(pos.st)].filter(Boolean);
  const sen=rc(['Middle','Senior','Lead']);
  const sow=[mSow(false,ri(80,140),30,180)];
  const exp=sow[0].expH,paid=0,bench=160,free=Math.max(0,160-exp);
  const nc=ri(2000,5000);
  const bc=Math.round((nc/140)*bench);
  return{...b,pos:pos.n,stk,sen,pt:'Fixed',sow,paid,exp,bench,free,nc,bc,bca:false,status:''};
}

const ALL=[];
for(let i=0;i<100;i++){const e=genE(i+1);e.status=getSt(e);ALL.push(e);}

// Edge case demo: employee with 5 SoWs
const demo5=ALL[3];
demo5.sow=[
  {project:'Amazon',expH:60,paidH:60,endsAt:'2026-08-01'},
  {project:'GoDee',expH:40,paidH:30,endsAt:'2026-06-15'},
  {project:'Veeqo',expH:30,paidH:30,endsAt:'2026-07-10'},
  {project:'Lido',expH:20,paidH:20,endsAt:'2026-09-01'},
  {project:'Internal',expH:15,paidH:0,endsAt:'2026-04-30'},
];
demo5.paid=demo5.sow.reduce((s,w)=>s+w.paidH,0);
demo5.exp=demo5.sow.reduce((s,w)=>s+w.expH,0);
demo5.bench=Math.max(0,160-demo5.paid);
demo5.free=Math.max(0,160-demo5.exp);
demo5.status=getSt(demo5);
if(demo5.nc)demo5.bc=demo5.bench>0?Math.round((demo5.nc/140)*demo5.bench):0;

const ADMIN=[];
for(let i=0;i<8;i++){const a=genAdmin(200+i);a.status=getSt(a);ADMIN.push(a);}

const fps=document.getElementById('fps'),fsk=document.getElementById('fsk');
[...new Set(ALL.map(e=>e.pos))].sort().forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;fps.appendChild(o);});
[...new Set(ALL.flatMap(e=>e.stk))].sort().forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fsk.appendChild(o);});

let actSt='',srchV='';
function showAdm(){return document.getElementById('showAdmin').checked;}
function getPool(){return showAdm()?[...ALL,...ADMIN]:[...ALL];}
function getFilt(){
  const pos=fps.value,sen=document.getElementById('fse').value,stk=fsk.value;
  return getPool().filter(e=>{
    if(srchV&&!e.name.toLowerCase().includes(srchV.toLowerCase()))return false;
    if(pos&&e.pos!==pos)return false;
    if(sen&&e.sen!==sen)return false;
    if(stk&&!e.stk.includes(stk))return false;
    if(actSt&&e.status!==actSt)return false;
    return true;
  }).sort((a,b)=>SPRI[a.status]-SPRI[b.status]);
}

function fmtDate(s){return new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});}

function rCap(e){
  const mH=Math.max(e.exp,160);
  const pp=Math.min(100,e.paid/mH*100).toFixed(1);
  const bh=Math.max(0,Math.min(e.exp,160)-e.paid);
  const bp=(bh/mH*100).toFixed(1);
  const oh=Math.max(0,e.exp-160);
  const op=(oh/mH*100).toFixed(1);
  const parts=[];
  if(e.paid>0)parts.push(`<span class="cpd">Paid ${e.paid}h</span>`);
  if(e.free>0)parts.push(`<span>Free ${e.free}h</span>`);
  if(oh>0)parts.push(`<span class="cov2">+${oh}h over</span>`);
  if(!parts.length)parts.push('<span>Free 160h</span>');
  return`<div class="cbar"><div class="sgp" style="width:${pp}%"></div><div class="sgb" style="width:${bp}%"></div><div class="sgo" style="width:${op}%"></div></div><div class="ctxt">${parts.join('<span style="color:#ddd"> · </span>')}</div>`;
}

function escAttr(v){return JSON.stringify(v).replace(/'/g,'&#39;');}

function rChips(e){
  if(!e.sow.length)return'<span class="nd2">—</span>';
  const vis=e.sow.slice(0,3),hid=e.sow.slice(3);
  const chips=vis.map(s=>`<span class="chp" data-sow='${escAttr({p:s.project,e:s.expH,pd:s.paidH,en:s.endsAt})}'><span class="cn">${s.project}</span><span class="cs">exp ${s.expH}h · paid ${s.paidH}h</span></span>`).join('');
  if(!hid.length)return`<div class="chps">${chips}</div>`;
  const hidData=escAttr(hid.map(s=>({p:s.project,e:s.expH,pd:s.paidH,en:s.endsAt})));
  return`<div class="chps">${chips}<button class="cmore" data-hid='${hidData}'>+${hid.length}</button></div>`;
}

function rBC(e){
  if(e.bench===0)return'<span class="nd2">$0</span>';
  if(!e.bc)return'<span class="nd2">—</span>';
  return(e.bca?'<span class="apx">~</span>':'')+'$'+e.bc.toLocaleString();
}

function rRow(e){
  const[ab,at]=AVP[e.name.charCodeAt(0)%AVP.length];
  const ptbdg=!e.isAdmin&&e.pt?`<span class="pbd">${e.pt}</span>`:'';
  const abadge=e.isAdmin?'<span class="abadge">Admin</span>':'';
  return`<tr><td><div class="ncel"><div class="ava" style="background:${ab};color:${at}">${e.init}</div><div class="dota" style="background:${SCOL[e.status]}"></div><span class="nmt" title="${e.name}">${e.name}</span>${ptbdg}${abadge}</div></td><td>${rCap(e)}</td><td><div class="allc">${e.exp}h</div></td><td><div class="bcc">${rBC(e)}</div></td><td>${rChips(e)}</td><td><div class="rcel"><span class="rpo">${e.pos}</span><span class="rse">${e.sen}</span></div></td><td><div class="sktg">${e.stk.filter(Boolean).map(s=>`<span class="stg">${s}</span>`).join('')}</div></td></tr>`;
}

function rSumm(){
  const pool=getPool();
  const cnt={overloaded:0,free:0,free30:0,busy:0,underloaded:0};
  let totBC=0,totNC=0;
  pool.forEach(e=>{cnt[e.status]++;totBC+=e.bc||0;totNC+=e.nc||0;});
  const pct=totNC>0?Math.round(totBC/totNC*100):0;
  const defs=[
    {s:'overloaded',l:'Overloaded',c:'#E24B4A',v:cnt.overloaded,sub:'Риск прямо сейчас'},
    {s:'free30',l:'Free in 30 days',c:'#EF9F27',v:cnt.free30,sub:'Найди проект до простоя'},
    {s:'free',l:'Free now',c:'#639922',v:cnt.free,sub:'Доступны немедленно'},
    {s:'bench',l:'Bench cost / month',c:null,v:'$'+totBC.toLocaleString(),sub:'~'+pct+'% of payroll'},
  ];
  return defs.map(d=>{
    if(d.s==='bench')return`<div class="sc nc"><div class="lb">${d.l}</div><div class="vl">${d.v}</div><div class="sub">${d.sub}</div></div>`;
    const ia=actSt===d.s;
    return`<div class="sc${ia?' act':''}" onclick="ej.fBySt('${d.s}')"><div class="lb"><span class="dot" style="background:${d.c}"></span>${d.l}</div><div class="vl" style="color:${d.c}">${d.v}</div><div class="sub">${ia?'Click to clear':'Click to filter'}</div></div>`;
  }).join('');
}

function render(){
  const f=getFilt();
  document.getElementById('sm').innerHTML=rSumm();
  document.getElementById('rc').textContent=`Showing ${f.length} of ${getPool().length} employees`;
  document.getElementById('tbd').innerHTML=f.length?f.map(rRow).join(''):`<tr><td colspan="7"><div class="est">No employees match the current filters</div></td></tr>`;
  const hf=srchV||fps.value||document.getElementById('fse').value||fsk.value||actSt;
  document.getElementById('rbtn').style.display=hf?'inline-block':'none';
}

// Tooltip
const tt=document.getElementById('tt');
function posT(ev){
  let x=ev.clientX+14,y=ev.clientY-10;
  if(x+280>window.innerWidth)x=ev.clientX-290;
  if(y+220>window.innerHeight)y=ev.clientY-200;
  tt.style.left=x+'px';tt.style.top=y+'px';
}
function sowTT(d){
  return`<div class="ttitle">${d.p}</div><div class="trow"><span>Expected</span><span>${d.e}h</span></div><div class="trow"><span>Paid</span><span>${d.pd}h</span></div><div class="trow"><span>Ends</span><span>${fmtDate(d.en)}</span></div>`;
}
function hidTT(arr){
  const hd=`<div class="tmore">${arr.length} more project${arr.length>1?'s':''}</div>`;
  const rows=arr.map((d,i)=>`${i>0?'<div class="tdiv"></div>':''}<div class="tbold">${d.p}</div><div class="trow"><span>Expected</span><span>${d.e}h</span></div><div class="trow"><span>Paid</span><span>${d.pd}h</span></div><div class="trow"><span>Ends</span><span>${fmtDate(d.en)}</span></div>`).join('');
  return hd+rows;
}
let ttCur=null;
const tbd=document.getElementById('tbd');
tbd.addEventListener('mouseover',ev=>{
  const chp=ev.target.closest('.chp');
  const cm=ev.target.closest('.cmore');
  if(chp){
    if(ttCur!==chp){ttCur=chp;try{tt.innerHTML=sowTT(JSON.parse(chp.dataset.sow));}catch(e){}}
    tt.style.display='block';posT(ev);
  }else if(cm){
    if(ttCur!==cm){ttCur=cm;try{tt.innerHTML=hidTT(JSON.parse(cm.dataset.hid));}catch(e){}}
    tt.style.display='block';posT(ev);
  }else{
    ttCur=null;tt.style.display='none';
  }
});
tbd.addEventListener('mousemove',ev=>{if(tt.style.display==='block')posT(ev);});
tbd.addEventListener('mouseleave',()=>{ttCur=null;tt.style.display='none';});

return{
  srch:v=>{srchV=v;render();},
  flt:()=>render(),
  fBySt:s=>{actSt=actSt===s?'':s;render();},
  rst:()=>{srchV='';actSt='';document.getElementById('srch').value='';fps.value='';document.getElementById('fse').value='';fsk.value='';render();}
};
})();
ej.flt();
</script>
</body>
</html>
